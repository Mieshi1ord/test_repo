name: Build Flet APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # позволяет запускать вручную

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flet requests
    
    - name: Prepare app file
      run: |
        # Если файл называется main.py, переименуем в app.py для Flet
        if [ -f "main.py" ]; then
          cp main.py app.py
        fi
        
        # Создаем минимальный flet.yaml если его нет
        if [ ! -f "flet.yaml" ]; then
          cat > flet.yaml << YAML
name: SectorPractic
version: 1.0.0
description: Job and internship portal
entrypoint: app.py
requirements:
  - requests
  - flet
YAML
        fi
    
    - name: Build APK
      run: |
        flet build apk --verbose
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: SectorPractic-App
        path: build/apk/*.apk
        compression-level: 0
    
    - name: Upload build logs (if failed)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          build.log
          **/*.log
