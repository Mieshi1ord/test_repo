name: Build Flet APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.9'
        channel: 'stable'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Accept Android Licenses
      run: yes | sdkmanager --licenses || true
    
    - name: Install Flet and dependencies
      run: |
        pip install --upgrade pip
        pip install flet requests python-socketio
    
    - name: Prepare app with dependencies
      run: |
        # Копируем main.py в app.py
        cp main.py app.py
        
        # Находим путь к установленным модулям
        SITE_PACKAGES=$(python -c "import site; print(site.getsitepackages()[0])")
        echo "Site packages: $SITE_PACKAGES"
        
        # Создаём папку для зависимостей
        mkdir -p dependencies
        
        # Копируем все необходимые модули
        cp -r $SITE_PACKAGES/requests dependencies/
        cp -r $SITE_PACKAGES/urllib3 dependencies/
        cp -r $SITE_PACKAGES/charset_normalizer dependencies/
        cp -r $SITE_PACKAGES/idna dependencies/
        cp -r $SITE_PACKAGES/certifi dependencies/
        cp -r $SITE_PACKAGES/python_socketio dependencies/
        cp -r $SITE_PACKAGES/socketio dependencies/
        cp -r $SITE_PACKAGES/engineio dependencies/
        cp -r $SITE_PACKAGES/bidict dependencies/
        
        # Создаём flet.yaml с указанием папки зависимостей
        cat > flet.yaml << 'EOF'
name: SectorPractic
version: 1.0.0
entrypoint: app.py
packages:
  - ./dependencies
EOF
        
        # Альтернативный flet.yaml с requirements
        cat > flet.yaml << 'EOF'
name: SectorPractic
version: 1.0.0
entrypoint: app.py
requirements:
  - requests
  - python-socketio
  - urllib3
  - certifi
  - charset-normalizer
  - idna
EOF
        
        # Создаём requirements.txt со всеми зависимостями
        cat > requirements.txt << 'EOF'
requests>=2.31.0
urllib3>=2.0.0
certifi>=2023.0.0
charset-normalizer>=3.0.0
idna>=3.0.0
python-socketio>=5.10.0
EOF
        
        # Проверяем содержимое
        ls -la
        cat flet.yaml
    
    - name: Build APK with verbose output
      run: |
        # Пробуем разные способы сборки
        yes | flet build apk --verbose || \
        yes | flet build apk --no-rich-output || \
        yes | flet build apk
    
    - name: Debug - Check if dependencies were included
      run: |
        # Проверяем, есть ли requests в собранном APK
        if [ -f "build/apk/app.apk" ]; then
          echo "APK found! Checking contents..."
          unzip -l build/apk/app.apk | grep -i "requests" || echo "Requests not found in APK"
        fi
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SectorPractic-App
        path: build/apk/*.apk
