name: Build Flet APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        channel: 'stable'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Accept Android Licenses
      run: |
        yes | sdkmanager --licenses
    
    - name: Install Flet
      run: |
        pip install flet requests
    
    - name: Prepare app
      run: |
        if [ -f "main.py" ]; then
          cp main.py app.py
        fi
        
        cat > flet.yaml << EOF
name: SectorPractic
version: 1.0.0
entrypoint: app.py
EOF
    
    - name: Build APK
      run: |
        yes | flet build apk
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SectorPractic-App
        path: build/apk/*.apk
