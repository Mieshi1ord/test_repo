name: Build Flet APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.9'
        channel: 'stable'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Accept Android Licenses
      run: |
        yes | sdkmanager --licenses || true
        yes | sdkmanager "platforms;android-33" || true
    
    - name: Install Flet and dependencies
      run: |
        pip install --upgrade pip
        pip install flet requests python-socketio
    
    - name: Prepare app for building
      run: |
        # Копируем main.py в app.py
        if [ -f "main.py" ]; then
          cp main.py app.py
        fi
        
        # Создаем flet.yaml
        echo "name: SectorPractic" > flet.yaml
        echo "description: Сектор практик и трудоустройства" >> flet.yaml
        echo "version: 1.0.0" >> flet.yaml
        echo "entrypoint: app.py" >> flet.yaml
        echo "requirements:" >> flet.yaml
        echo "  - requests" >> flet.yaml
        echo "  - python-socketio" >> flet.yaml
        echo "android:" >> flet.yaml
        echo "  package_name: com.sectorpractic.app" >> flet.yaml
        echo "  icon: null" >> flet.yaml
        echo "  uses_cleartext_traffic: true" >> flet.yaml
        echo "  min_sdk_version: 21" >> flet.yaml
        echo "  target_sdk_version: 33" >> flet.yaml
        
        # Создаем requirements.txt
        echo "requests>=2.31.0" > requirements.txt
        echo "python-socketio>=5.10.0" >> requirements.txt
        
        # Проверяем содержимое
        echo "=== flet.yaml ==="
        cat flet.yaml
        echo "=== requirements.txt ==="
        cat requirements.txt
    
    - name: Build APK
      run: |
        flet build apk --verbose
        
        if [ -d "build/apk" ]; then
          echo "APK built successfully!"
          ls -la build/apk/
        else
          echo "Build directory not found"
          exit 1
        fi
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: SectorPractic-APK
        path: |
          build/apk/*.apk
          build/app/outputs/flutter-apk/*.apk
        if-no-files-found: warn
