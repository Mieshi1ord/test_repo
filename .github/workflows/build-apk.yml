name: Build Flet APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.9'
        channel: 'stable'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Accept Android Licenses
      run: yes | sdkmanager --licenses || true
    
    - name: Install Flet and dependencies
      run: |
        pip install --upgrade pip
        pip install flet requests python-socketio
    
    - name: Prepare app with dependencies
      run: |
        # Копируем main.py в app.py
        cp main.py app.py
        
        # Находим путь к установленным модулям
        SITE_PACKAGES=$(python -c "import site; print(site.getsitepackages()[0])")
        echo "Site packages: $SITE_PACKAGES"
        
        # Создаём папку для зависимостей
        mkdir -p dependencies
        
        # Копируем все необходимые модули
        cp -r $SITE_PACKAGES/requests dependencies/ 2>/dev/null || true
        cp -r $SITE_PACKAGES/urllib3 dependencies/ 2>/dev/null || true
        cp -r $SITE_PACKAGES/charset_normalizer dependencies/ 2>/dev/null || true
        cp -r $SITE_PACKAGES/idna dependencies/ 2>/dev/null || true
        cp -r $SITE_PACKAGES/certifi dependencies/ 2>/dev/null || true
        cp -r $SITE_PACKAGES/python_socketio dependencies/ 2>/dev/null || true
        cp -r $SITE_PACKAGES/socketio dependencies/ 2>/dev/null || true
        cp -r $SITE_PACKAGES/engineio dependencies/ 2>/dev/null || true
        cp -r $SITE_PACKAGES/bidict dependencies/ 2>/dev/null || true
        
        # Создаём flet.yaml с requirements
        echo "name: SectorPractic" > flet.yaml
        echo "version: 1.0.0" >> flet.yaml
        echo "entrypoint: app.py" >> flet.yaml
        echo "requirements:" >> flet.yaml
        echo "  - requests" >> flet.yaml
        echo "  - python-socketio" >> flet.yaml
        echo "  - urllib3" >> flet.yaml
        echo "  - certifi" >> flet.yaml
        echo "  - charset-normalizer" >> flet.yaml
        echo "  - idna" >> flet.yaml
        
        # Создаём requirements.txt со всеми зависимостями
        echo "requests>=2.31.0" > requirements.txt
        echo "urllib3>=2.0.0" >> requirements.txt
        echo "certifi>=2023.0.0" >> requirements.txt
        echo "charset-normalizer>=3.0.0" >> requirements.txt
        echo "idna>=3.0.0" >> requirements.txt
        echo "python-socketio>=5.10.0" >> requirements.txt
        
        # Проверяем содержимое
        echo "=== flet.yaml ==="
        cat flet.yaml
        echo "=== requirements.txt ==="
        cat requirements.txt
        echo "=== Dependencies folder ==="
        ls -la dependencies/ || echo "No dependencies folder"
    
    - name: Build APK
      run: |
        yes | flet build apk --verbose
    
    - name: Debug - Check if dependencies were included
      run: |
        if [ -f "build/apk/app.apk" ]; then
          echo "APK found! Checking contents..."
          unzip -l build/apk/app.apk | grep -i "requests" || echo "Requests not found in APK"
        elif [ -f "build/apk/SectorPractic.apk" ]; then
          echo "APK found! Checking contents..."
          unzip -l build/apk/SectorPractic.apk | grep -i "requests" || echo "Requests not found in APK"
        else
          echo "APK file not found"
          find build -name "*.apk" 2>/dev/null || echo "No APK files found"
        fi
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SectorPractic-App
        path: |
          build/apk/*.apk
          build/app/outputs/flutter-apk/*.apk
        if-no-files-found: warn
