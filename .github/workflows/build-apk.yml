name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Accept Android Licenses
      run: yes | sdkmanager --licenses || true
    
    - name: Install Flet
      run: pip install flet
    
    - name: Build APK
      run: |
        cp main.py app.py
        echo "name: SectorPractic" > flet.yaml
        echo "version: 1.0.0" >> flet.yaml
        echo "entrypoint: app.py" >> flet.yaml
        echo "requirements:" >> flet.yaml
        echo "  - requests" >> flet.yaml
        echo "  - python-socketio" >> flet.yaml
        yes | flet build apk
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SectorPractic-APK
        path: build/apk/
